<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Image Cropper · Dual‑panel layout</title>
    <link rel="stylesheet" href="static/css/base.css" />
    <link rel="stylesheet" href="static/css/components.css" />
    <link rel="stylesheet" href="static/css/layout.css" />
    <script type="module" src="static/js/main.js"></script>
  </head>
  <body>
    <header>
      <h1>✧ DUAL‑VIEW CROPPER</h1>
      <div class="coords" id="coords">x: — y: — | w: — h: —</div>
    </header>

    <div class="workspace" id="workspace">

      <!-- DROP ZONE -->
      <div class="drop-zone" id="drop-zone">
        <div class="icon">◧</div>
        <p>Drop images here, or <span id="browse-btn">browse</span></p>
        <p>PNG · JPG · WEBP · GIF &nbsp;·&nbsp; up to 610 images</p>
      </div>
      <!-- multiple: allows selecting up to 610 files at once -->
      <input type="file" id="file-input" accept="image/*" multiple />

      <!-- CANVAS (hidden until image loaded) -->
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
        <div class="selection-box" id="selection-box"></div>
      </div>

      <!-- RIGHT STACK: toolbar + preview -->
      <div class="right-stack">

        <div class="toolbar" id="toolbar">
          <div class="toolbar-row">
            <div>
              <div class="size-info" id="size-info">⚡ no active crop</div>
              <div class="queue-info" id="queue-info"></div>
            </div>
            <div style="display: flex; gap: 8px">
              <button id="start-crop-btn" class="primary" disabled>✧ Start cropping</button>
              <button id="reset-btn" class="danger">⟳ Reset all</button>
            </div>
          </div>

          <!-- manual coordinate inputs -->
          <div class="crop-inputs">
            <div class="input-group">
              <label>X (px)</label>
              <input type="number" id="crop-x" step="1" value="0" disabled />
            </div>
            <div class="input-group">
              <label>Y (px)</label>
              <input type="number" id="crop-y" step="1" value="0" disabled />
            </div>
            <div class="input-group">
              <label>Width</label>
              <input type="number" id="crop-w" step="1" value="0" disabled />
            </div>
            <div class="input-group">
              <label>Height</label>
              <input type="number" id="crop-h" step="1" value="0" disabled />
            </div>
          </div>

          <div class="toolbar-row" style="justify-content: flex-end">
            <button id="crop-btn" class="primary">✂︎ Apply crop (live)</button>
          </div>
        </div>

        <div class="preview-section" id="preview-section">
          <div class="preview-label">// Live cropped preview</div>
          <canvas id="preview-canvas"></canvas>
          <div class="preview-actions">
            <input
              type="text"
              class="filename-input"
              id="filename-input"
              placeholder="filename"
              value="cropped"
            />
            <button class="primary" id="save-btn">Save PNG</button>
            <button id="new-crop-btn">⟳ New crop</button>
            <!-- submit-btn: hidden until images are queued (controlled by upload.js) -->
            <button class="primary" id="submit-btn" style="display:none">↑ Upload all</button>
          </div>
        </div>

      </div><!-- /.right-stack -->
    </div><!-- /.workspace -->
  </body>
</html>
