<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Image Cropper · Dual‑panel layout</title>
  <link rel="stylesheet" href="static/css/base.css" />
  <link rel="stylesheet" href="static/css/components.css" />
  <link rel="stylesheet" href="static/css/layout.css" />
  <script type="module" src="static/js/main.js"></script>
</head>

<body>
  <header>
    <div class="container">
      <h1>✧ DUAL‑VIEW CROPPER</h1>
      <div class="coords" id="coords">x: — y: — | w: — h: —</div>
    </div>
  </header>

  <div class="workspace container" id="workspace">
    <!-- DROP ZONE -->
    <div class="drop-zone" id="drop-zone">
      <div class="icon">◧</div>
      <p>Drop images here, or <span id="browse-btn">browse</span></p>
      <p>PNG · JPG · WEBP · GIF &nbsp;·&nbsp; up to 610 images</p>
    </div>
    <!-- multiple: allows selecting up to 610 files at once -->
    <input type="file" id="file-input" accept="image/*" multiple />

    <div class="left-stack" id="left-stack">
      <!-- CANVAS (hidden until image loaded) -->
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
        <div class="selection-box" id="selection-box"></div>
      </div>

      <div class="carousel" id="carousel">
        <div class="carousel-header">
          <div class="preview-label">// Images</div>
          <div class="carousel-nav">
            <button id="carousel-prev">← Prev</button>
            <button id="carousel-next">Next →</button>
          </div>
        </div>
        <div class="thumb-strip" id="thumb-strip"></div>
      </div>
    </div>

    <!-- RIGHT STACK: toolbar + preview -->
    <div class="right-stack">
      <div class="toolbar" id="toolbar">
        <div class="toolbar-row">
          <div>
            <div class="size-info" id="size-info">⚡ no active crop</div>
            <div class="queue-info" id="queue-info"></div>
            <div class="crop-status" id="crop-status">
              <span class="status-pill" id="status-bounds">bounds: pending</span>
              <span class="status-pill" id="status-sura">sura_name: pending</span>
              <span class="status-pill" id="status-aya">aya_separator: pending</span>
            </div>
          </div>
          <div style="display: flex; gap: 8px">
            <button id="start-crop-btn" class="primary" disabled>
              ✧ Start cropping
            </button>
            <button id="reset-btn" class="danger">⟳ Reset all</button>
          </div>
        </div>

        <!-- manual coordinate inputs -->
        <div class="crop-inputs">
          <div class="input-group">
            <label>Target</label>
            <select id="crop-mode">
              <option value="bounds">bounds</option>
              <option value="sura_name">sura_name</option>
              <option value="aya_separator">aya_separator</option>
            </select>
          </div>
          <div class="input-group">
            <label>X (px)</label>
            <input type="number" id="crop-x" step="1" value="0" disabled />
          </div>
          <div class="input-group">
            <label>Y (px)</label>
            <input type="number" id="crop-y" step="1" value="0" disabled />
          </div>
          <div class="input-group">
            <label>Width</label>
            <input type="number" id="crop-w" step="1" value="0" disabled />
          </div>
          <div class="input-group">
            <label>Height</label>
            <input type="number" id="crop-h" step="1" value="0" disabled />
          </div>
        </div>

        <!-- line-detection parameters -->
        <div class="crop-inputs">
          <div class="input-group">
            <label>Gap thr.</label>
            <input type="number" id="gap-threshold" step="0.01" min="0" max="1" value="0.03" />
          </div>
          <div class="input-group">
            <label>Min height</label>
            <input type="number" id="min-line-height" step="1" min="1" value="20" />
          </div>
          <div class="input-group">
            <label>Padding</label>
            <input type="number" id="padding" step="1" min="0" value="4" />
          </div>
          <div class="input-group">
            <label for="alternate-horizontal-margin">Alternate margins</label>
            <input type="checkbox" id="alternate-horizontal-margin" />
          </div>
        </div>

        <div class="toolbar-row" style="justify-content: flex-end">
          <button id="crop-btn" class="primary">✂︎ Apply crop (live)</button>
        </div>
      </div>

      <div class="preview-section" id="preview-section">
        <div class="preview-label">// Live cropped preview</div>
        <canvas id="preview-canvas"></canvas>
        <div class="preview-actions">
          <input type="text" class="filename-input" id="filename-input" placeholder="filename" value="cropped" />
          <button class="primary" id="save-btn">Save PNG</button>
          <button id="new-crop-btn">⟳ New crop</button>
          <!-- submit-btn: hidden until images are queued (controlled by upload.js) -->
          <button class="primary" id="submit-btn" style="display: none">
            ↑ Upload all
          </button>
        </div>
      </div>
    </div>
    <!-- /.right-stack -->
  </div>
  <!-- /.workspace -->
</body>

</html>
